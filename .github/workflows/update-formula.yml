name: Update Formula

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag like v0.1.0"
        required: false
        type: string
  repository_dispatch:
    types: [update-formula]
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Update formula
        env:
          UPSTREAM_REPO: OsamuDazai666/ani-nexus-tui
          RELEASE_TAG: ${{ github.event.client_payload.release_tag || inputs.release_tag }}
        run: |
          ./scripts/update_formula.sh

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/ani-nexus-tui.rb
          git commit -m "chore: update ani-nexus-tui formula"
          git push
